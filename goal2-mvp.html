<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal2</title>
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;
  --txt:#f0f0f0;--muted:#555;--muted2:#333;
  --green:#4ade80;--blue:#60a5fa;--amber:#fbbf24;--red:#f87171;
  --easy:#4ade80;--medium:#fbbf24;--hard:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}

/* ── screens ── */
.screen{min-height:100vh;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── STEP 1: LANDING ── */
#s-landing{align-items:center;justify-content:center;padding:40px 24px}
.brand{font-size:13px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:64px}
.drop-area{width:100%;max-width:400px;text-align:center}
.drop-zone{border:1px solid var(--border);border-radius:24px;padding:72px 40px;cursor:pointer;
  transition:all .2s;background:var(--surface)}
.drop-zone:hover,.drop-zone.over{border-color:#444;background:var(--surface2)}
.drop-icon{font-size:36px;margin-bottom:20px;opacity:.7}
.drop-title{font-size:22px;font-weight:500;margin-bottom:8px;letter-spacing:-.3px}
.drop-sub{font-size:14px;color:var(--muted);line-height:1.6}
.drop-or{font-size:12px;color:var(--muted2);margin:20px 0}
.link-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;
  text-decoration:underline;text-underline-offset:3px}
.link-btn:hover{color:var(--txt)}
.loading-state{text-align:center;padding:40px}
.loading-state p{font-size:14px;color:var(--muted);margin-top:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--txt);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none !important}

/* ══════════════════════════════════════
   STEP 1.5: INTAKE — beautiful Q&A
══════════════════════════════════════ */
#s-intake{
  align-items:center;
  justify-content:center;
  padding:0;
  position:relative;
  overflow:hidden;
}

.intake-bg-glow{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 60%, rgba(96,165,250,.04) 0%, transparent 70%);
  pointer-events:none;
}

.intake-wrap{
  width:100%;
  max-width:520px;
  padding:0 32px;
  position:relative;
  z-index:1;
}

/* Progress dots */
.intake-progress{
  display:flex;
  gap:6px;
  justify-content:center;
  margin-bottom:56px;
}
.intake-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--border);
  transition:background .3s, transform .3s;
}
.intake-dot.active{background:var(--txt);transform:scale(1.2);}
.intake-dot.done{background:var(--muted);}

/* The question slide */
.intake-slide{
  text-align:center;
  animation:slideIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideIn{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
.intake-slide.exit{
  animation:slideOut .25s cubic-bezier(.4,0,1,1) both;
}
@keyframes slideOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(-14px)}
}

.intake-eyebrow{
  font-size:11px;letter-spacing:.18em;color:var(--muted);
  text-transform:uppercase;margin-bottom:20px;
}
.intake-q{
  font-size:28px;font-weight:500;letter-spacing:-.5px;
  line-height:1.25;margin-bottom:10px;
}
.intake-hint{
  font-size:14px;color:var(--muted);line-height:1.6;
  margin-bottom:42px;min-height:20px;
}

/* Large GPA input */
.intake-number-wrap{
  display:flex;align-items:center;justify-content:center;
  gap:12px;margin-bottom:40px;
}
.intake-number{
  width:120px;
  background:none;
  border:none;
  border-bottom:2px solid var(--border);
  color:var(--txt);
  font-size:42px;
  font-weight:300;
  text-align:center;
  padding:0 0 8px;
  font-family:inherit;
  letter-spacing:-.5px;
  transition:border-color .2s;
  -moz-appearance:textfield;
}
.intake-number::-webkit-outer-spin-button,
.intake-number::-webkit-inner-spin-button{-webkit-appearance:none}
.intake-number:focus{outline:none;border-bottom-color:var(--txt);}
.intake-number::placeholder{color:var(--muted2);}
.intake-number-unit{font-size:16px;color:var(--muted);font-weight:400;align-self:flex-end;padding-bottom:12px;}

/* Pill choices */
.intake-pills{
  display:flex;flex-wrap:wrap;gap:10px;
  justify-content:center;margin-bottom:40px;
}
.intake-pill{
  padding:12px 22px;border-radius:100px;
  border:1px solid var(--border);background:none;
  color:var(--muted);font-size:15px;font-weight:400;
  cursor:pointer;font-family:inherit;transition:all .15s;
  letter-spacing:-.1px;
}
.intake-pill:hover{border-color:#444;color:var(--txt);}
.intake-pill.selected{
  border-color:var(--txt);
  color:var(--txt);
  background:rgba(240,240,240,.07);
}
.intake-pill.multi.selected{
  border-color:var(--blue);
  color:var(--blue);
  background:rgba(96,165,250,.08);
}

/* Continue button */
.intake-cta{
  background:var(--txt);color:var(--bg);
  border:none;padding:16px 40px;border-radius:100px;
  font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit;letter-spacing:-.1px;
  transition:opacity .15s, transform .1s;
}
.intake-cta:hover{opacity:.9}
.intake-cta:active{opacity:.8;transform:scale(.98)}
.intake-cta:disabled{opacity:.25;cursor:not-allowed}

.intake-skip{
  display:block;margin-top:18px;
  background:none;border:none;
  color:var(--muted);font-size:13px;
  cursor:pointer;font-family:inherit;
  text-underline-offset:3px;
}
.intake-skip:hover{color:var(--txt);}

/* ── STEP 2: TOPICS ── */
#s-topics{padding:0}
.step-wrap{max-width:560px;margin:0 auto;padding:48px 24px 80px;width:100%}
.step-label{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:32px}
.step-title{font-size:26px;font-weight:500;letter-spacing:-.4px;margin-bottom:6px}
.step-sub{font-size:14px;color:var(--muted);margin-bottom:40px;line-height:1.6}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:18px 20px;margin-bottom:10px}
.topic-name{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.topic-name input{flex:1;background:none;border:none;color:var(--txt);font-size:15px;font-weight:500;padding:0;font-family:inherit}
.topic-name input:focus{outline:none}
.topic-name input::placeholder{color:var(--muted)}
.del-btn{background:none;border:none;color:var(--muted2);font-size:18px;cursor:pointer;line-height:1;padding:2px 4px}
.del-btn:hover{color:var(--red)}
.diff-row{display:flex;gap:6px}
.diff-pill{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:none;
  font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--muted);font-family:inherit}
.diff-pill.easy.active{background:rgba(74,222,128,.12);border-color:var(--easy);color:var(--easy)}
.diff-pill.medium.active{background:rgba(251,191,36,.12);border-color:var(--medium);color:var(--medium)}
.diff-pill.hard.active{background:rgba(248,113,113,.12);border-color:var(--hard);color:var(--hard)}
.diff-pill:hover:not(.active){border-color:#444;color:var(--txt)}
.fam-label{font-size:11px;color:var(--muted);margin-top:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.grade-row{display:flex;gap:5px;flex-wrap:wrap}
.grade-pill{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:none;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);font-family:inherit}
.grade-pill.active{background:rgba(96,165,250,.12);border-color:var(--blue);color:var(--blue)}
.grade-pill:hover:not(.active){border-color:#444;color:var(--txt)}
.add-topic-btn{width:100%;padding:14px;border-radius:12px;border:1px dashed var(--border);
  background:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px;font-family:inherit}
.add-topic-btn:hover{border-color:#444;color:var(--txt)}

/* ── STEP 3: SCHEDULE ── */
#s-schedule{padding:0}
.goal-input{width:100%;background:none;border:none;border-bottom:1px solid var(--border);
  color:var(--txt);font-size:20px;font-weight:500;padding:0 0 12px;font-family:inherit;
  letter-spacing:-.2px;margin-bottom:36px}
.goal-input:focus{outline:none;border-bottom-color:#555}
.goal-input::placeholder{color:var(--muted)}
.date-row{display:flex;gap:12px;margin-bottom:36px}
.date-field{flex:1}
.date-field label{font-size:12px;color:var(--muted);display:block;margin-bottom:8px}
.date-field input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--txt);
  padding:12px 14px;border-radius:12px;font-size:14px;font-family:inherit}
.date-field input:focus{outline:none;border-color:#444}
.week-title{font-size:12px;color:var(--muted);margin-bottom:12px}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:36px}
.day-col{text-align:center}
.day-name{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.day-toggle{width:100%;aspect-ratio:1;border-radius:10px;border:1px solid var(--border);
  background:none;cursor:pointer;font-size:12px;color:var(--muted);transition:.15s;font-family:inherit}
.day-toggle.on{background:rgba(240,240,240,.08);border-color:#444;color:var(--txt)}
.day-hrs{width:100%;margin-top:5px;background:var(--surface2);border:1px solid var(--border);
  color:var(--txt);padding:5px 2px;border-radius:7px;font-size:12px;text-align:center;font-family:inherit}
.day-hrs:focus{outline:none}

/* ── CTA BUTTON ── */
.cta{width:100%;padding:16px;border-radius:14px;border:none;background:var(--txt);
  color:var(--bg);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;
  letter-spacing:-.1px;transition:.15s}
.cta:hover{opacity:.9}
.cta:active{opacity:.8;transform:scale(.99)}
.back-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;
  margin-bottom:28px;padding:0;font-family:inherit;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:var(--txt)}

/* ── STEP 4: PLAN ── */
#s-plan{padding:0;flex-direction:column}

/* Top nav area */
.plan-top{max-width:680px;margin:0 auto;padding:40px 24px 0;width:100%}
.plan-header-goal{font-size:22px;font-weight:500;letter-spacing:-.3px;margin-bottom:4px}
.plan-header-meta{font-size:13px;color:var(--muted);margin-bottom:28px}

/* Stats strip */
.stats-strip{display:flex;gap:20px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:24px}
.stat-item .stat-n{font-size:20px;font-weight:600}
.stat-item .stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* Week tabs */
.week-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.week-tab{padding:5px 12px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:.12s}
.week-tab:hover{border-color:#444;color:var(--txt)}
.week-tab.active{background:rgba(240,240,240,.07);border-color:#555;color:var(--txt)}

/* Day strip */
.day-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:28px}
.day-chip{text-align:center;padding:10px 4px 12px;border-radius:14px;border:1px solid transparent;
  transition:all .14s;position:relative}
.day-chip.has-sessions{cursor:pointer}
.day-chip.has-sessions:hover{border-color:var(--border)}
.day-chip.selected{border-color:#555;background:rgba(240,240,240,.06)}
.day-chip.empty{opacity:.28;pointer-events:none}
.dc-name{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.dc-num{font-size:18px;font-weight:600;line-height:1;margin-bottom:7px}
.dc-dot{width:5px;height:5px;border-radius:50%;margin:0 auto}
.dc-rest .dc-dot{background:var(--muted2)}

/* Day detail */
.day-detail{max-width:680px;margin:0 auto;padding:0 24px 80px;width:100%;flex:1}
.day-char-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
.day-title{font-size:20px;font-weight:500;letter-spacing:-.3px;margin-bottom:4px}
.day-summary{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}

/* Session cards */
.sesh-card{border:1px solid var(--border);border-radius:18px;padding:22px 22px 18px;
  margin-bottom:10px;background:var(--surface);overflow:hidden;position:relative}
.sesh-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.sesh-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sesh-badge{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  padding:4px 10px;border-radius:6px}
.sesh-mins{font-size:12px;color:var(--muted)}
.sesh-topic{font-size:17px;font-weight:500;letter-spacing:-.25px;margin-bottom:8px;line-height:1.3}
.sesh-desc{font-size:14px;line-height:1.7;margin-bottom:18px}
.sesh-action{display:flex;justify-content:flex-end}
.sesh-btn{background:none;border:1px solid var(--border);color:var(--muted);
  padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:.14s}
.sesh-btn:hover{border-color:#555;color:var(--txt)}

.rest-card{text-align:center;padding:48px 24px;color:var(--muted2);font-size:13px}
.rest-card-label{margin-top:10px;font-size:15px;color:var(--muted)}

.study-btn{background:none;border:1px solid var(--border);color:var(--muted);
  padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s}
.study-btn:hover{border-color:#555;color:var(--txt)}

/* ── CHAT MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;
  align-items:flex-end;justify-content:center;z-index:100;padding:0}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;
  width:100%;max-width:640px;height:85vh;display:flex;flex-direction:column}
.modal-hd{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border)}
.modal-topic{font-size:15px;font-weight:500}
.modal-type{font-size:12px;color:var(--muted);margin-top:2px}
.close-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;width:30px;height:30px;font-size:16px;cursor:pointer;line-height:1}
.close-btn:hover{color:var(--txt)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:82%;padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.6}
.msg.user{align-self:flex-end;background:var(--surface2);border:1px solid var(--border)}
.msg.ai{align-self:flex-start;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.15)}
.msg b{color:var(--blue)}
.typing-indicator{align-self:flex-start;color:var(--muted);font-size:13px;font-style:italic;padding:4px 0}
.chat-in{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.chat-in textarea{flex:1;min-height:42px;max-height:100px;font-size:14px;resize:none;
  background:var(--surface2);border:1px solid var(--border);color:var(--txt);
  padding:10px 13px;border-radius:10px;font-family:inherit;line-height:1.5}
.chat-in textarea:focus{outline:none;border-color:#444}
.send-btn{background:var(--txt);color:var(--bg);border:none;padding:10px 16px;
  border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.session-summary{background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.15);
  border-radius:12px;padding:16px;font-size:13px;line-height:1.6}
.session-summary h4{font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px}
.end-session-btn{background:none;border:1px solid var(--border);color:var(--muted);
  padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;
  display:block;margin:4px auto 0;transition:.15s}
.end-session-btn:hover{border-color:#555;color:var(--txt)}

/* ── DRAG OVERLAY (landing only) ── */
#dragOverlay{position:fixed;inset:0;z-index:200;background:rgba(96,165,250,.08);
  border:2px dashed rgba(96,165,250,.4);display:flex;align-items:center;justify-content:center;pointer-events:all}
#dragOverlay.hidden{display:none}
#dragOverlay p{color:var(--blue);font-size:18px;font-weight:500;pointer-events:none}

@media(max-width:500px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .days-grid{gap:4px}
  .intake-q{font-size:22px}
  .intake-number{font-size:34px}
}
</style>
</head>
<body>

<!-- ══ SCREEN 1: LANDING ══ -->
<div class="screen active" id="s-landing">
  <div class="drop-area" style="width:100%;max-width:400px;margin:auto;padding:40px 24px;text-align:center">
    <div class="brand">Goal2</div>
    <div id="dropMain">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('pdfInput').click()">
        <div class="drop-icon">📄</div>
        <div class="drop-title">Drop your syllabus</div>
        <div class="drop-sub">We'll extract every topic and build your study prescription automatically.</div>
        <div class="drop-or">or</div>
        <button class="link-btn" onclick="event.stopPropagation();manualSetup()">set up manually</button>
      </div>
      <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="handlePdf(this.files[0])">
    </div>
    <div class="loading-state hidden" id="loadingState">
      <div class="spinner"></div>
      <p id="loadingMsg">Reading your syllabus…</p>
    </div>
  </div>
</div>

<!-- ══ SCREEN 1.5: INTAKE ══ -->
<div class="screen" id="s-intake">
  <div class="intake-bg-glow"></div>
  <div class="intake-wrap">
    <div class="intake-progress" id="intakeDots"></div>
    <div id="intakeSlot"></div>
  </div>
</div>

<!-- Hidden state holders (not shown to user) -->
<div style="display:none">
  <div id="topicList"></div>
  <input id="goalInput"><input type="date" id="startDate"><input type="date" id="examDate">
</div>

<!-- ══ SCREEN 4: PLAN ══ -->
<div class="screen" id="s-plan">
  <div class="plan-top">
    <button class="back-btn" onclick="startIntake()">← Edit</button>
    <div class="plan-header-goal" id="planGoal"></div>
    <div class="plan-header-meta" id="planMeta"></div>
    <div class="week-tabs" id="weekTabs"></div>
    <div class="day-strip" id="dayStrip"></div>
  </div>
  <div class="day-detail" id="dayDetail"></div>
</div>

<!-- ══ DRAG OVERLAY (landing only) ══ -->
<div id="dragOverlay" class="hidden">
  <p>Drop your PDF to get started</p>
</div>

<!-- ══ CHAT MODAL ══ -->
<div class="modal-bg hidden" id="chatModal">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-topic" id="chatTitle"></div>
        <div class="modal-type" id="chatSub"></div>
      </div>
      <button class="close-btn" onclick="closeChat()">×</button>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-in">
      <textarea id="chatInput" placeholder="Type your answer…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script>
const API_KEY="YOUR_OPENAI_API_KEY_HERE";
const MODEL="gpt-4o-mini";
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const today=new Date();
const iso=d=>d.toISOString().slice(0,10);
let currentScreen="s-landing";

// ── Intake state ──
let intakeAnswers={gpa:null,targetGrade:null,weeks:null};
let currentQ=0;

const INTAKE_QUESTIONS=[
  {
    id:"gpa",
    eyebrow:"Let's calibrate",
    q:"What's your current GPA?",
    hint:"We use this to weight your plan. Lower GPA → more time built in. Optional.",
    type:"number",
    placeholder:"3.4",
    unit:"/ 4.0",
    optional:true,
  },
  {
    id:"targetGrade",
    eyebrow:"Set the bar",
    q:"What grade are you going for?",
    hint:"This sets how hard we push the plan.",
    type:"pills",
    options:["A","B","C","Just pass"],
    optional:false,
  },
  {
    id:"weeks",
    eyebrow:"Set the clock",
    q:"How many weeks until your exam?",
    hint:"We'll reverse-engineer every day from here.",
    type:"number",
    placeholder:"4",
    unit:"weeks",
    optional:false,
    min:1,max:52,step:1,
  },
];

function buildIntakeDots(){
  const el=document.getElementById("intakeDots");
  el.innerHTML="";
  INTAKE_QUESTIONS.forEach((_,i)=>{
    const d=document.createElement("div");
    d.className="intake-dot"+(i===currentQ?" active":i<currentQ?" done":"");
    el.appendChild(d);
  });
}

function renderIntakeQuestion(idx){
  currentQ=idx;
  buildIntakeDots();
  const q=INTAKE_QUESTIONS[idx];
  const slot=document.getElementById("intakeSlot");

  // Build inner HTML based on type
  let inputHtml="";
  if(q.type==="number"){
    const stateKey=q.id;
    const val=intakeAnswers[stateKey]!=null?intakeAnswers[stateKey]:"";
    const min=q.min!=null?q.min:0;
    const max=q.max!=null?q.max:99;
    const step=q.step!=null?q.step:0.1;
    inputHtml=`
      <div class="intake-number-wrap">
        <input class="intake-number" id="intakeNum" type="number" min="${min}" max="${max}" step="${step}"
          placeholder="${q.placeholder}" value="${val}"
          oninput="intakeAnswers['${stateKey}']=this.value?parseFloat(this.value):null;updateCtaState()"
          onkeydown="if(event.key==='Enter')advanceIntake()">
        <span class="intake-number-unit">${q.unit}</span>
      </div>`;
  } else if(q.type==="pills"){
    const sel=intakeAnswers.targetGrade;
    inputHtml=`<div class="intake-pills">`+
      q.options.map(o=>`<button class="intake-pill${sel===o?" selected":""}"
        onclick="selectSingle(this,'targetGrade','${o}')">${o}</button>`).join("")+
      `</div>`;
  } else if(q.type==="multi"){
    const sel=intakeAnswers.challenge||[];
    inputHtml=`<div class="intake-pills">`+
      q.options.map(o=>`<button class="intake-pill multi${sel.includes(o)?" selected":""}"
        onclick="toggleMulti(this,'challenge','${o}')">${o}</button>`).join("")+
      `</div>`;
  }

  const isLast=idx===INTAKE_QUESTIONS.length-1;
  const skipLabel=q.optional?(isLast?"Skip & build plan":"Skip this one →"):"";

  slot.innerHTML=`
    <div class="intake-slide" id="intakeSlide">
      <div class="intake-eyebrow">${q.eyebrow}</div>
      <div class="intake-q">${q.q}</div>
      <div class="intake-hint">${q.hint}</div>
      ${inputHtml}
      <button class="intake-cta" id="intakeNext" onclick="advanceIntake()">
        ${idx<INTAKE_QUESTIONS.length-1?"Continue →":"Build my plan →"}
      </button>
      ${skipLabel?`<button class="intake-skip" onclick="skipIntake()">${skipLabel}</button>`:""}
    </div>`;

  // Auto-focus number input
  if(q.type==="number")setTimeout(()=>document.getElementById("intakeNum")?.focus(),120);

  // For non-optional pill questions, disable continue until selected
  if(q.type==="pills"&&!q.optional) updateCtaState();
}

function updateCtaState(){
  const q=INTAKE_QUESTIONS[currentQ];
  const btn=document.getElementById("intakeNext");
  if(!btn)return;
  if(!q.optional){
    if(q.type==="pills") btn.disabled=!intakeAnswers[q.id];
    else if(q.type==="number") btn.disabled=!(intakeAnswers[q.id]>0);
    else btn.disabled=false;
  }else{
    btn.disabled=false;
  }
}

function selectSingle(el,key,val){
  intakeAnswers[key]=val;
  el.closest(".intake-pills").querySelectorAll(".intake-pill").forEach(p=>p.classList.remove("selected"));
  el.classList.add("selected");
  updateCtaState();
}

function toggleMulti(el,key,val){
  if(!intakeAnswers[key])intakeAnswers[key]=[];
  const arr=intakeAnswers[key];
  const idx=arr.indexOf(val);
  if(idx>-1){arr.splice(idx,1);el.classList.remove("selected");}
  else{arr.push(val);el.classList.add("selected");}
}

function advanceIntake(){
  if(currentQ<INTAKE_QUESTIONS.length-1){
    // Animate out, then render next
    const slide=document.getElementById("intakeSlide");
    if(slide){slide.classList.add("exit");setTimeout(()=>renderIntakeQuestion(currentQ+1),220);}
    else renderIntakeQuestion(currentQ+1);
  }else{
    finishIntake();
  }
}

function skipIntake(){
  const q=INTAKE_QUESTIONS[currentQ];
  intakeAnswers[q.id]=null;
  advanceIntake();
}

function finishIntake(){
  // Build the plan immediately — no topics or schedule screens
  const weeks=intakeAnswers.weeks||4;
  const exam=new Date(today);
  exam.setDate(exam.getDate()+Math.round(weeks*7));
  document.getElementById("examDate").value=iso(exam);
  document.getElementById("startDate").value=iso(today);
  buildPlan();
}

function startIntake(){
  currentQ=0;
  intakeAnswers={gpa:null,targetGrade:null,weeks:null};
  goTo("s-intake");
  renderIntakeQuestion(0);
}

// ── PDF handling ──
async function handlePdf(file){
  if(!file||file.type!=="application/pdf"){alert("Please use a PDF file.");return;}
  document.getElementById("dropMain").classList.add("hidden");
  const ls=document.getElementById("loadingState");
  ls.classList.remove("hidden");
  setLoadingMsg("Reading your syllabus");
  try{
    const text=await extractPdfText(file);
    setLoadingMsg("Identifying topics");
    await parseSyllabus(text);
  }catch(e){
    ls.classList.add("hidden");
    document.getElementById("dropMain").classList.remove("hidden");
    alert("Error: "+e.message);
  }
}

let dotInterval=null;
function setLoadingMsg(base){
  const el=document.getElementById("loadingMsg");
  if(dotInterval)clearInterval(dotInterval);
  let dots=0;
  el.textContent=base+"...";
  dotInterval=setInterval(()=>{dots=(dots+1)%4;el.textContent=base+".".repeat(dots||1);},400);
}

async function extractPdfText(file){
  if(!window.pdfjsLib){
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc=
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  let out="";
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    out+=tc.items.map(x=>x.str).join(" ")+"\n";
  }
  return out.trim();
}

async function callGPT(messages,max_tokens=900){
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
    body:JSON.stringify({model:MODEL,messages,max_tokens})
  });
  const j=await res.json();
  if(j.error)throw new Error(j.error.message);
  return j.choices[0].message.content.trim();
}

async function parseSyllabus(text){
  const raw=await callGPT([{role:"user",content:
    `Extract all study topics from this syllabus. Return JSON only:
{"goal":"Ace [CourseName]","topics":[{"name":"...","diff":"Easy"|"Medium"|"Hard","hrs":number}]}
Syllabus:\n${text.slice(0,6000)}`}]);
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("Could not parse AI response");
  const p=JSON.parse(m[0]);
  document.getElementById("goalInput").value=p.goal||"";
  // Store topics — difficulty assigned by GPT, no user self-assessment
  buildTopicList((p.topics||[]).map(t=>({...t,grade:"Never studied"})));
  document.getElementById("startDate").value=iso(today);
  // Reset landing UI
  if(dotInterval)clearInterval(dotInterval);
  document.getElementById("loadingState").classList.add("hidden");
  document.getElementById("dropMain").classList.remove("hidden");
  startIntake();
}

// Study days/hours are set by DEFAULT_CAP — no schedule screen needed.

// ══ PLAN ENGINE ══════════════════════════

// Session types — AI-defined, each has its own duration + character
const STYPE={
  deep:      {label:"Deep work",     color:"#60a5fa",bg:"rgba(96,165,250,.09)",  lo:68,hi:85},
  retrieval: {label:"Retrieval",     color:"#a78bfa",bg:"rgba(167,139,250,.09)", lo:17,hi:24},
  interleave:{label:"Interleave",    color:"#22d3ee",bg:"rgba(34,211,238,.09)",  lo:38,hi:48},
  drill:     {label:"Problem drill", color:"#fbbf24",bg:"rgba(251,191,36,.09)",  lo:28,hi:36},
  mock:      {label:"Mock exam",     color:"#4ade80",bg:"rgba(74,222,128,.09)",  lo:72,hi:90},
};

// Day-of-week palette: the AI defines what mode fits each day
const DAY_PALETTE={
  0:["retrieval"],                         // Sun — review only, lower gear
  1:["deep","interleave"],                 // Mon — fresh week, prime window
  2:["deep","drill"],                      // Tue — build + practice
  3:["interleave","drill","retrieval"],    // Wed — cross-topic connections
  4:["deep","retrieval"],                  // Thu — one more push + consolidate
  5:["retrieval","drill"],                 // Fri — close out the week
  6:["deep","interleave","drill"],         // Sat — long productive stretch
};

// Day character shown as label above sessions
const DAY_CHAR={
  0:"Review day",1:"Learning day",2:"Learning day",
  3:"Mixed day",4:"Learning day",5:"Consolidation day",6:"Long session day"
};

const BASE_HRS={
  Easy:   {"A":0.4,"B":0.75,"C":1.25,"D":1.75,"F":2,"Never studied":2},
  Medium: {"A":0.8,"B":1.5, "C":2.5, "D":3.5, "F":4,"Never studied":4},
  Hard:   {"A":1.5,"B":3,   "C":5,   "D":6.5, "F":7.5,"Never studied":7.5}
};

function rand(lo,hi){return lo+Math.floor(Math.random()*(hi-lo+1));}

function getGpaMultiplier(){
  const gpa=intakeAnswers.gpa;
  if(gpa==null||isNaN(gpa))return 1.0;
  if(gpa>=3.7)return 0.85;if(gpa>=3.0)return 1.0;
  if(gpa>=2.5)return 1.15;if(gpa>=2.0)return 1.3;return 1.5;
}

function getTargetMultiplier(){
  const g=intakeAnswers.targetGrade;
  if(g==="A")return 1.2;if(g==="B")return 1.0;
  if(g==="C")return 0.85;if(g==="Just pass")return 0.7;return 1.0;
}

const DIFF_W={Easy:1,Medium:1.6,Hard:2.4};
const SPACING=[2,5,11,21];

// Default study capacity: Mon–Fri 1.5h, Sat 2.5h, Sun 2h
const DEFAULT_CAP={0:2,1:1.5,2:1.5,3:1.5,4:1.5,5:2.5};

// Plan state for day-picker
let planDays=[], planGoalText="", planExamDate=null;
let selectedWeekIdx=0, selectedDayIso=null;

function buildPlan(){
  const topics=getTopics();
  const cap=DEFAULT_CAP;
  const goal=document.getElementById("goalInput").value.trim()||"My goal";
  const start=new Date(document.getElementById("startDate").value+"T00:00");
  const exam=new Date(document.getElementById("examDate").value+"T00:00");
  if(!topics.length){alert("No topics found — try uploading your syllabus again.");return;}
  if(!(exam>start)){alert("Exam date must be after today.");return;}

  // Build day objects
  const days=[];
  for(let d=new Date(start);d<exam;d.setDate(d.getDate()+1)){
    const dow=d.getDay();
    if(cap[dow])days.push({date:new Date(d),dow,cap:cap[dow],used:0,sessions:[]});
  }
  if(!days.length){alert("No available study days.");return;}

  const gpaM=getGpaMultiplier(), tgtM=getTargetMultiplier();
  let ts=topics.map((t,i)=>{
    const hrs=(BASE_HRS[t.diff]||BASE_HRS.Medium)[t.grade||"Never studied"]||3;
    return{...t,id:i,corrected:hrs*gpaM*tgtM,weight:DIFF_W[t.diff]||1.6,firstLearn:null};
  });
  ts.sort((a,b)=>b.weight-a.weight||b.corrected-a.corrected);

  const place=(di,sesh,mins)=>{
    for(let k=di;k<days.length;k++){
      if(days[k].used+mins<=days[k].cap*60+5){days[k].used+=mins;days[k].sessions.push(sesh);return days[k];}
    }
    const last=days[days.length-1];last.used+=mins;last.sessions.push(sesh);return last;
  };

  const lw=Math.max(1,Math.floor(days.length*0.62));
  ts.forEach((t,i)=>{
    const total=Math.round(t.corrected*60);
    const chunks=Math.max(1,Math.ceil(total/55));
    const cmin=Math.round(total/chunks);
    for(let c=0;c<chunks;c++){
      const di=Math.round((c/Math.max(1,chunks))*lw+i)%Math.max(1,lw);
      const placed=place(Math.min(di,days.length-1),{type:"new",topic:t.name,diff:t.diff,mins:cmin},cmin);
      if(!t.firstLearn)t.firstLearn=placed.date;
    }
  });

  ts.forEach(t=>{
    if(!t.firstLearn)return;
    SPACING.forEach(gap=>{
      const rd=new Date(t.firstLearn);rd.setDate(rd.getDate()+gap);
      if(rd>=exam)return;
      const di=days.findIndex(x=>iso(x.date)>=iso(rd));
      if(di<0)return;
      place(di,{type:"review",topic:t.name,diff:t.diff,mins:20},20);
    });
  });

  // Last 3 days → mock exam sessions
  days.slice(-Math.min(3,days.length)).forEach(d=>{
    d.sessions.push({type:"test",topic:"Full mixed review",diff:"—",mins:80});
    d.used+=80;
  });

  // ── Post-process: assign rich session types + calibrated durations ──
  const topicNames=ts.map(t=>t.name);
  let newCount=0;
  days.forEach(d=>{
    const palette=DAY_PALETTE[d.dow]||["retrieval"];
    d.sessions.forEach(s=>{
      if(s.type==="test"){s.stype="mock";s.mins=rand(STYPE.mock.lo,STYPE.mock.hi);return;}
      if(s.type==="review"){s.stype="retrieval";s.mins=rand(STYPE.retrieval.lo,STYPE.retrieval.hi);return;}
      if(s.type==="new"){
        if(d.dow===0){s.stype="retrieval";s.mins=rand(17,24);return;}  // Sunday = review only
        newCount++;
        if(newCount%3===0&&palette.includes("interleave")){
          s.stype="interleave";
          const idx=topicNames.indexOf(s.topic);
          s.pair=topicNames[(idx+1)%topicNames.length];
          s.mins=rand(STYPE.interleave.lo,STYPE.interleave.hi);
        } else if(palette.includes("deep")){
          s.stype="deep";s.mins=rand(STYPE.deep.lo,STYPE.deep.hi);
        } else if(palette.includes("drill")){
          s.stype="drill";s.mins=rand(STYPE.drill.lo,STYPE.drill.hi);
        } else {
          s.stype="retrieval";s.mins=rand(STYPE.retrieval.lo,STYPE.retrieval.hi);
        }
      }
    });
  });

  renderPlan(goal,exam,days,ts);
}

// ── Render: day-picker plan ──
function renderPlan(goal,exam,days,topics){
  planDays=days;planGoalText=goal;planExamDate=exam;

  const totalMin=days.reduce((s,d)=>s+d.sessions.reduce((a,x)=>a+x.mins,0),0);
  const nSessions=days.reduce((s,d)=>s+d.sessions.length,0);
  const dLeft=Math.ceil((exam-today)/(864e5));

  document.getElementById("planGoal").textContent=goal;
  document.getElementById("planMeta").textContent=
    `Exam ${exam.toLocaleDateString("en-US",{month:"long",day:"numeric"})}`;
  // Stats intentionally not shown — no aggregate numbers at the top

  // Group days into weeks, aligned to day-of-week
  const weekBase=startOfWeek(days[0].date);
  const weeks=[];
  days.forEach(d=>{
    const wi=Math.floor((d.date-weekBase)/(7*864e5));
    if(!weeks[wi])weeks[wi]=Array(7).fill(null);
    weeks[wi][d.dow]=d;
  });
  window._planWeeks=weeks;

  // Week tabs
  document.getElementById("weekTabs").innerHTML=
    weeks.map((_,i)=>`<button class="week-tab${i===0?" active":""}" onclick="selectWeek(${i})">Wk ${i+1}</button>`).join("");

  selectedWeekIdx=0;
  renderWeekStrip(0);

  // Auto-select first study day
  const firstDay=days[0];
  selectedDayIso=iso(firstDay.date);
  renderDayDetail(firstDay);
  goTo("s-plan");
}

function selectWeek(wi){
  selectedWeekIdx=wi;
  document.querySelectorAll(".week-tab").forEach((t,i)=>t.classList.toggle("active",i===wi));
  renderWeekStrip(wi);
  const first=(window._planWeeks[wi]||[]).find(d=>d&&d.sessions.length);
  if(first){selectedDayIso=iso(first.date);renderDayDetail(first);}
  else document.getElementById("dayDetail").innerHTML="";
}

function renderWeekStrip(wi){
  const week=window._planWeeks[wi]||[];
  document.getElementById("dayStrip").innerHTML=DOW.map((name,dow)=>{
    const d=week[dow];
    if(!d)return`<div class="day-chip empty"><div class="dc-name">${name[0]}</div><div class="dc-num">–</div><div class="dc-dot" style="background:var(--border)"></div></div>`;
    const hasSesh=d.sessions.length>0;
    const isSel=iso(d.date)===selectedDayIso;
    const primaryColor=hasSesh?(STYPE[d.sessions[0]?.stype]?.color||"var(--muted)"):"var(--muted2)";
    return`<div class="day-chip${hasSesh?" has-sessions":""}${isSel?" selected":""}" onclick="${hasSesh?`handleDayClick('${iso(d.date)}')`:""}" >
      <div class="dc-name">${name.slice(0,3)}</div>
      <div class="dc-num">${d.date.getDate()}</div>
      <div class="dc-dot" style="background:${primaryColor}"></div>
    </div>`;
  }).join("");
}

function handleDayClick(isoStr){
  selectedDayIso=isoStr;
  renderWeekStrip(selectedWeekIdx);
  const d=planDays.find(x=>iso(x.date)===isoStr);
  if(d)renderDayDetail(d);
}

function renderDayDetail(d){
  const el=document.getElementById("dayDetail");
  if(!d.sessions.length){
    el.innerHTML=`<div class="rest-card"><div style="font-size:22px;opacity:.25">○</div><div class="rest-card-label">Rest day</div></div>`;
    return;
  }
  const dateStr=d.date.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const charLabel=DAY_CHAR[d.dow]||"Study day";
  const totalMins=d.sessions.reduce((s,x)=>s+x.mins,0);
  const nS=d.sessions.length;
  const accentColor=STYPE[d.sessions[0]?.stype]?.color||"var(--muted)";

  let html=`<div class="day-char-label" style="color:${accentColor}">${charLabel}</div>
    <div class="day-title">${dateStr}</div>
    <div class="day-summary">${nS} session${nS!==1?"s":""} · ${totalMins} min</div>`;

  d.sessions.forEach(s=>{
    const st=STYPE[s.stype]||STYPE.deep;
    html+=`<div class="sesh-card" style="background:${st.bg}">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${st.color};border-radius:3px 0 0 3px"></div>
      <div class="sesh-top">
        <span class="sesh-badge" style="background:${st.color}1a;color:${st.color}">${st.label}</span>
        <span class="sesh-mins">${s.mins} min</span>
      </div>
      <div class="sesh-topic">${esc(s.topic)}</div>
      <div class="sesh-desc" style="color:var(--muted)">${sessionDesc(s)}</div>
      <div class="sesh-action">
        <button class="sesh-btn" onclick="openChat('${esc(s.topic)}','${s.stype||s.type}')">Study with AI →</button>
      </div>
    </div>`;
  });

  el.innerHTML=html;
}

function sessionDesc(s){
  const t=s.topic, p=s.pair;
  switch(s.stype||s.type){
    case"deep":
      return`Read through ${t} like it's a conversation. When done, close everything and write what you remember — no peeking. The blank page is where the learning happens.`;
    case"retrieval":
      return`No notes, no book. What do you actually know about ${t}? Write it first, then check. Every gap you find now is one that won't catch you on exam day.`;
    case"interleave":
      return`Study ${t}, then immediately switch to ${p||"your next topic"}. The friction of switching is the point — your brain works harder to keep them separate, so it retains both better.`;
    case"drill":
      return`Work problems on ${t}. Don't look at solutions until you've genuinely tried. Getting stuck and pushing past it is worth more than getting it right quickly.`;
    case"mock":
      return`Exam conditions. Timer on, everything closed. Every mistake here is free — it costs nothing now and saves you on the real day.`;
    default:
      return`Study ${t}.`;
  }
}

function startOfWeek(d){const x=new Date(d);x.setDate(x.getDate()-x.getDay());x.setHours(0,0,0,0);return x;}
function esc(s){return(s+"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// ── chat ──
let chatHistory=[];
function openChat(topic,type){
  chatHistory=[];
  document.getElementById("chatTitle").textContent=topic;
  const typeLabels={deep:"Deep work",retrieval:"Retrieval",interleave:"Interleave",drill:"Problem drill",mock:"Mock exam",new:"Learning",review:"Retrieval",test:"Mock exam"};
  document.getElementById("chatSub").textContent=typeLabels[type]||"Study session";
  document.getElementById("chatMsgs").innerHTML="";
  document.getElementById("chatModal").classList.remove("hidden");
  const isRetrieval=type==="retrieval"||type==="review";
  const isMock=type==="mock"||type==="test";
  const isDrill=type==="drill";
  const isInterleave=type==="interleave";
  const sys=isMock
    ?`You are an exam simulator. Ask one question at a time, no notes allowed, strict exam conditions. Give brief feedback, then continue.`
    :isRetrieval
    ?`You are a Socratic coach running retrieval practice on "${topic}". Ask one question at a time. No hints until the student tries. Brief, honest feedback after each answer.`
    :isDrill
    ?`You are a problem-solving coach for "${topic}". Give one practice problem at a time. Let the student work. Only give guidance when they're genuinely stuck.`
    :isInterleave
    ?`You are a Socratic coach helping the student find connections between topics, starting with "${topic}". Ask them to compare concepts, spot patterns, and explain differences.`
    :`You are a Socratic coach helping someone learn "${topic}" for the first time. Start by asking what they already know — even roughly. Guide with questions, don't lecture.`;
  chatHistory.push({role:"system",content:sys});
  const opener=isMock
    ?`Exam mode — timer running, nothing open.\n\nFirst question: what's the core concept behind **${topic}**?`
    :isRetrieval
    ?`Retrieval session on **${topic}**. No notes.\n\nWhat are the most important things you remember about this?`
    :isDrill
    ?`Let's drill **${topic}**.\n\nHere's your first problem — work through it before looking anything up:`
    :`Let's get into **${topic}**.\n\nWhat do you already know about this — even loosely?`;
  appendMsg("ai",opener);
  chatHistory.push({role:"assistant",content:opener});
}

function appendMsg(role,text){
  const div=document.createElement("div");
  div.className="msg "+role;
  div.innerHTML=text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>");
  document.getElementById("chatMsgs").appendChild(div);
  document.getElementById("chatMsgs").scrollTop=99999;
}

async function sendMsg(){
  const inp=document.getElementById("chatInput");
  const text=inp.value.trim();if(!text)return;
  inp.value="";appendMsg("user",text);
  chatHistory.push({role:"user",content:text});
  document.getElementById("sendBtn").disabled=true;
  const t=document.createElement("div");t.className="typing-indicator";t.id="typing";t.textContent="…";
  document.getElementById("chatMsgs").appendChild(t);
  document.getElementById("chatMsgs").scrollTop=99999;
  try{
    const reply=await callGPT(chatHistory,600);
    document.getElementById("typing")?.remove();
    appendMsg("ai",reply);chatHistory.push({role:"assistant",content:reply});
    const userTurns=chatHistory.filter(m=>m.role==="user").length;
    if(userTurns===5)autoSummary(); // trigger once at 5 exchanges
  }catch(e){document.getElementById("typing")?.remove();appendMsg("ai","⚠ "+e.message);}
  document.getElementById("sendBtn").disabled=false;
}

let pendingSummary=null; // stores summary data until modal closes

async function autoSummary(){
  if(document.getElementById("summaryInline"))return;
  // Quietly fetch — don't interrupt the conversation
  try{
    const raw=await callGPT([...chatHistory,{role:"user",content:'Analyse this study session concisely. JSON only: {"understood":[],"shaky":[],"gaps":[],"takeaway":"one sentence coaching note"}'}],350);
    const m=raw.match(/\{[\s\S]*\}/);if(!m)return;
    pendingSummary=JSON.parse(m[0]);
    // Show a subtle "done" nudge at the bottom
    if(!document.getElementById("closeCue")){
      const cue=document.createElement("div");
      cue.id="closeCue";
      cue.style.cssText="text-align:center;padding:14px 0 4px;font-size:12px;color:var(--muted)";
      cue.textContent="Session summary ready — close to see your takeaway";
      document.getElementById("chatMsgs").appendChild(cue);
      document.getElementById("chatMsgs").scrollTop=99999;
    }
  }catch(e){/* fail silently */}
}

function closeChat(){
  document.getElementById("chatModal").classList.add("hidden");
  if(pendingSummary){
    showTakeaway(pendingSummary);
    pendingSummary=null;
  }
}

function showTakeaway(r){
  // Inject a takeaway card into the current day's session detail
  const el=document.getElementById("dayDetail");
  if(!el)return;
  const card=document.createElement("div");
  card.style.cssText="border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:16px;background:var(--surface);animation:slideIn .35s cubic-bezier(.22,1,.36,1)";
  card.innerHTML=`
    <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:12px">Session takeaway</div>
    ${r.understood?.length?`<p style="font-size:13px;margin-bottom:6px"><span style="color:var(--green);font-weight:600">Solid: </span>${r.understood.join(", ")}</p>`:""}
    ${r.shaky?.length?`<p style="font-size:13px;margin-bottom:6px"><span style="color:var(--amber);font-weight:600">Shaky: </span>${r.shaky.join(", ")}</p>`:""}
    ${r.gaps?.length?`<p style="font-size:13px;margin-bottom:6px"><span style="color:var(--red);font-weight:600">Gaps: </span>${r.gaps.join(", ")}</p>`:""}
    ${r.takeaway?`<p style="font-size:13px;color:var(--muted);margin-top:10px;line-height:1.6">${r.takeaway}</p>`:""}`;
  el.appendChild(card);
  el.scrollTop=el.scrollHeight;
}
</script>

</html>
